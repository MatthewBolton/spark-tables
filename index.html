  <style>
    /* Dice roller: fixed toolbar at bottom, expands upward */
    #dice-root {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 9000;
      pointer-events: auto;
      max-height: calc(100vh - 12px);
      overflow-y: auto;
    }
    .app { padding-bottom: var(--dice-root-height, 52px); }
    @media (min-width: 600px) {
      #dice-root { left: calc(50vw - 300px); right: auto; width: 600px; }
    }
    /* 3D dice overlay — must be above the toolbar (z-index > 9000) */
    #dice-box-container {
      position: fixed;
      left: 0; right: 0; top: 0;
      bottom: var(--dice-root-height, 60px);
      z-index: 10000;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      background: linear-gradient(to top, rgba(10,8,6,0.32), rgba(10,8,6,0.08) 55%, rgba(10,8,6,0));
      transition: opacity 150ms ease, transform 220ms ease;
    }
    #dice-box { width: 100%; height: 100%; }
    #dice-box-snapshot {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
    }
  </style>

// ─── HELPERS ─────────────────────────────────────────────────────────────────

const secureRand = n => {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % n;
};
const d12 = () => secureRand(12);
const rand = n => secureRand(n);
function rollSparkTable(tableData, extendedMode) {
  const hasExtended = Array.isArray(tableData.extended) && tableData.extended.length > 0;
  const useExtended = extendedMode && hasExtended;
  const pool = useExtended ? tableData.extended : tableData.rows;
  const rollMax = useExtended ? 100 : 12;
  const i1 = useExtended ? rand(100) : d12();
  const i2 = useExtended ? rand(100) : d12();
  const row1 = pool[i1] || tableData.rows[i1 % tableData.rows.length];
  const row2 = pool[i2] || tableData.rows[i2 % tableData.rows.length];
  return {
    mode: "spark",
    die: useExtended ? "d100" : "d12",
    rollMax,
    usedExtended: useExtended,
    extendedAvailable: hasExtended,
    fallbackToD12: extendedMode && !hasExtended,
    col1: {
      label: tableData.cols[0],
      value: row1[0],
      roll: i1 + 1
    },
    col2: {
      label: tableData.cols[1],
      value: row2[1],
      roll: i2 + 1
    }
  };
}
function rollOracleTable(tableData, extendedMode) {
  const n = tableData.entries.length;
  const pool = extendedMode ? n : Math.min(12, n);
  const i = rand(pool);
  return {
    mode: "oracle",
    value: tableData.entries[i],
    roll: i + 1,
    total: pool
  };
}
